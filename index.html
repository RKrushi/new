<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theme Selector</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:30px;
}

button{
    width:200px;
    padding:15px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.theme1{background:#ff4d4d;color:white;}
.theme2{background:#4CAF50;color:white;}
.theme3{background:#2196F3;color:white;}
.theme4{background:#ff9800;color:white;}
.theme5{background:#9C27B0;color:white;}

</style>
</head>

<body>

<div class="container">

<h1>Select Website Theme</h1>

<button class="theme1" onclick="goTheme('them1.html')">Theme 1</button>
<button class="theme2" onclick="goTheme('them2.html')">Theme 2</button>
<button class="theme3" onclick="goTheme('final.html')">Theme 3</button>
<button class="theme4" onclick="goTheme('final2.html')">Theme 4</button>


</div>

<script>

function goTheme(page){
    window.location.href = page;
}

</script>

</body>
</html>
