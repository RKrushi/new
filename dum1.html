<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Awesome Home Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Three.js (core) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.min.js"></script>
  <!-- Lenis for smooth scrolling (optional, just for the background) -->
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.12/dist/lenis.min.js"></script>
  <style>
html{font-size:17px;}
    /* ------------------------------------------------------------------ */
    /* 1️⃣  Global reset & typography                                      */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html, body { height:100%; font-family: 'Helvetica Neue', Arial, sans-serif; }
    body {
      overflow:hidden;               /* we control scroll via Lenis */
      background:#111;               /* fallback colour */
      color:#fff;
    }

    /* ------------------------------------------------------------------ */
    /* 2️⃣  Canvas for the Three.js background                              */
    /* ------------------------------------------------------------------ */
    #bg-canvas {
      position:fixed;
      inset:0;
      z-index:-1;
    }

    /* ------------------------------------------------------------------ */
    /* 3️⃣  Main container – centers the content                           */
    /* ------------------------------------------------------------------ */
    .wrapper {
      position:relative;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:2rem;
      padding:1rem;
    }

    h1 {
      font-size:2.5rem;
      text-align:center;
      letter-spacing:0.5px;
    }

    /* ------------------------------------------------------------------ */
    /* 4️⃣  Buttons – the 4 navigation tiles                               */
    /* ------------------------------------------------------------------ */
    .nav-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:1.5rem;
      width:100%;
      max-width:900px;
    }

    .nav-btn {
      background:rgba(255,255,255,0.08);
      border:2px solid rgba(255,255,255,0.2);
      border-radius:12px;
      padding:1.5rem 1rem;
      text-align:center;
      font-size:1.2rem;
      font-weight:600;
      color:#fff;
      text-decoration:none;
      backdrop-filter:blur(6px);
      transition: all 0.3s ease;
    }

    .nav-btn:hover,
    .nav-btn:focus {
      background:rgba(255,255,255,0.15);
      border-color:#fff;
      transform:translateY(-4px);
      box-shadow:0 8px 20px rgba(0,0,0,0.4);
    }

    /* ------------------------------------------------------------------ */
    /* 5️⃣  Mobile tweaks                                                   */
    /* ------------------------------------------------------------------ */
    @media (max-width:600px) {
      h1 { font-size:2rem; }
      .nav-btn { font-size:1rem; padding:1.2rem 0.8rem; }
    }
  </style>
</head>

<body>
  <!-- 1️⃣  Three.js background canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- 2️⃣  Page content -->
  <div class="wrapper">
    <h1>Welcome to My Site</h1>

    <div class="nav-grid">
      <!-- Replace href="#" with your real URLs -->
      <a class="nav-btn" href="https://example.com/page1">Page 1</a>
      <a class="nav-btn" href="https://example.com/page2">Page 2</a>
      <a class="nav-btn" href="https://example.com/page3">Page 3</a>
      <a class="nav-btn" href="https://example.com/page4">Page 4</a>
    </div>
  </div>

  <!-- ------------------------------------------------------------------ -->
  <!-- 3️⃣  Three.js + Lenis background script                              -->
  <!-- ------------------------------------------------------------------ -->
  <script>
    // --------------------------------------------------------------
    // 3‑D background: a rotating field of low‑poly triangles
    // --------------------------------------------------------------
    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0); // transparent background

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 5);

    // Geometry: a simple icosahedron (low‑poly sphere) that we’ll rotate
    const geometry = new THREE.IcosahedronGeometry(1.5, 1);
    const material = new THREE.MeshStandardMaterial({
      color: 0x00bfff,
      flatShading: true,
      metalness: 0.2,
      roughness: 0.7,
      emissive: 0x001133,
      emissiveIntensity: 0.6,
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Lights – a soft ambient + a point light that follows the mouse
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const point = new THREE.PointLight(0xffffff, 0.8);
    point.position.set(5, 5, 5);
    scene.add(point);

    // --------------------------------------------------------------
    // Lenis – smooth scroll (only needed if you later add long content)
    // --------------------------------------------------------------
    const lenis = new Lenis({
      duration: 1.2,
      easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
      smoothWheel: true,
    });

    // --------------------------------------------------------------
    // Animation loop – sync Lenis, camera, and mesh rotation
    // --------------------------------------------------------------
    function render(time) {
      // Lenis tick (time is in ms)
      lenis.raf(time);

      // Rotate the geometry slowly
      mesh.rotation.x += 0.001;
      mesh.rotation.y += 0.0015;

      // Make the point light follow the cursor (optional)
      // (if you want, uncomment the event listener below)
      // point.position.lerp(mousePos, 0.05);

      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    // --------------------------------------------------------------
    // Resize handling
    // --------------------------------------------------------------
    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    });

    // --------------------------------------------------------------
    // OPTIONAL – make the point light follow the mouse
    // --------------------------------------------------------------
    const mousePos = new THREE.Vector3();
    window.addEventListener('pointermove', (e) => {
      const x = (e.clientX / window.innerWidth) * 2 - 1;
      const y = -(e.clientY / window.innerHeight) * 2 + 1;
      mousePos.set(x * 5, y * 5, 5);
    });
  </script>
</body>
</html>
